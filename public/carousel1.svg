<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" style="background: #060b0d; font-family: 'Courier New', monospace;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } }
      @keyframes rotate-ui { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes data-flicker { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
      @keyframes spike-short { 0%, 100% { height: 2px; } 50% { height: 12px; } }
      @keyframes scan-v { 0% { top: 0%; } 100% { top: 100%; } }

      .accent { stroke: #00f2ff; stroke-width: 1.5; fill: none; filter: url(#glow); }
      .dim { stroke: #1a3a40; stroke-width: 0.5; fill: none; }
      .text-main { fill: #00f2ff; font-size: 12px; font-weight: bold; filter: url(#glow); }
      .text-small { fill: #527d82; font-size: 9px; text-transform: uppercase; }
      .warning { fill: #ff0055; font-weight: bold; animation: data-flicker 0.5s step-end infinite; }
      .spike { fill: #00f2ff; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#060b0d" />
  <path d="M 0 250 L 800 250 M 400 0 L 400 500" stroke="#0f1a1d" stroke-width="1" />

  <g transform="translate(400, 250)">
    <circle r="140" class="dim" stroke-dasharray="2,6" />
    <circle r="110" class="dim" />
    
    <g style="animation: rotate-ui 15s linear infinite;">
      <path d="M 52 -30 L 52 30 L 0 60 L -52 30 L -52 -30 L 0 -60 Z" class="accent" />
      <circle cy="-90" r="3" fill="#00f2ff" />
      <text y="-100" text-anchor="middle" class="text-small" style="font-size:7px">AXIS_REF_ALPHA</text>
    </g>
    
    <line x1="-160" y1="0" x2="160" y2="0" class="dim" />
    <line x1="0" y1="-160" x2="0" y2="160" class="dim" />
    <circle r="4" fill="#fff" filter="url(#glow)" />
  </g>

  <g transform="translate(200, 250)">
    <path d="M -40 -55 L -55 -55 L -55 55 L -40 55 M 40 -55 L 55 -55 L 55 55 L 40 55" class="accent" />
    <text x="0" y="-15" text-anchor="middle" class="text-main">OBJ_01: NPU_IN</text>
    
    <g transform="translate(-30, 5)">
      <rect x="0" y="0" width="2" height="5" class="spike" style="animation: spike-short 0.4s infinite" />
      <rect x="10" y="0" width="2" height="5" class="spike" style="animation: spike-short 0.7s infinite 0.2s" />
      <rect x="20" y="0" width="2" height="5" class="spike" style="animation: spike-short 0.5s infinite 0.1s" />
      <rect x="30" y="0" width="2" height="5" class="spike" style="animation: spike-short 0.9s infinite 0.4s" />
      <rect x="40" y="0" width="2" height="5" class="spike" style="animation: spike-short 0.6s infinite 0.2s" />
    </g>
    
    <text x="-70" y="5" text-anchor="end" class="text-small" style="animation: data-flicker 0.1s infinite;">51143 [V]</text>
  </g>

  <g transform="translate(600, 250)">
    <path d="M -40 -55 L -55 -55 L -55 55 L -40 55 M 40 -55 L 55 -55 L 55 55 L 40 55" class="accent" />
    <text x="0" y="-15" text-anchor="middle" class="text-main">OBJ_02: SNN_OUT</text>
    
    <g transform="translate(-35, 10)">
      <text x="0" y="0" class="text-small" style="font-size:7px">ERR_RATE: 0.002ms</text>
      <rect x="0" y="5" width="70" height="2" fill="#1a3a40" />
      <rect x="0" y="5" width="45" height="2" fill="#00f2ff" style="animation: pulse 2s infinite" />
    </g>
    
    <text x="70" y="5" text-anchor="start" class="text-small">B_STATE: OK</text>
  </g>

  <g transform="translate(400, 60)">
    <text x="0" y="0" text-anchor="middle" class="text-small" style="letter-spacing: 5px; fill:#fff">4 15 0 5 2</text>
    <path d="M -60 12 L 60 12 M -60 12 L -60 6 M 60 12 L 60 6 M 0 12 L 0 18" class="accent" stroke-width="1" />
  </g>

  <text x="200" y="100" class="text-small" style="letter-spacing: 2px;">SYNC_LOCKED</text>
  <text x="565" y="100" class="text-small" style="letter-spacing: 2px; fill: #ff0055;">ARMED</text>
  
  <g transform="translate(400, 440)">
    <text text-anchor="middle" class="warning" style="font-size: 10px;">[!] DYNAMIC RE-BAKE REQUIRED: SNN_CORE_DRIFT</text>
    <text y="15" text-anchor="middle" class="text-small" style="letter-spacing: 4px;">DSMT // CALIBRATION_MODE</text>
  </g>

  <g transform="translate(150, 180)">
    <line x1="0" y1="0" x2="0" y2="140" class="accent" stroke-width="0.5" />
    <path d="M 0 0 L -8 0 M 0 70 L -8 70 M 0 140 L -8 140" class="accent" stroke-width="1" />
    <text x="-12" y="4" text-anchor="end" class="text-small">40</text>
    <text x="-12" y="74" text-anchor="end" class="text-small">20</text>
    <text x="-12" y="144" text-anchor="end" class="text-small">0</text>
  </g>

</svg>
