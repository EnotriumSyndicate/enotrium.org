<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" style="background: #010309; font-family: 'Chakra Petch', 'Courier New', monospace;">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&amp;display=swap');
            text { fill: #00f0ff; text-shadow: 0 0 3px #00f0ff; }
            .g-line { stroke: #00f0ff; fill: none; stroke-linecap: round; }
            .g-fill { fill: rgba(0, 240, 255, 0.1); stroke: #00f0ff; }
            .g-text { fill: #00f0ff; opacity: 0.7; }
            
            .r-line { stroke: #ff0055; fill: none; }
            .r-fill { fill: rgba(255, 0, 85, 0.15); stroke: #ff0055; }
            .r-text { fill: #ff0055; text-shadow: 0 0 3px #ff0055; }

            .y-line { stroke: #ffd700; fill: none; } /* Axonal delay/Weight color */

            /* ANIMATION KEYFRAMES */
            @keyframes bloomPulse {
                0% { opacity: 0.8; transform: scale(1); filter: blur(4px); }
                50% { opacity: 1; transform: scale(1.05); filter: blur(8px); }
                100% { opacity: 0.8; transform: scale(1); filter: blur(4px); }
            }

            @keyframes spikePulse {
                0% { opacity: 1; transform: scale(1); fill: #ffffff; }
                100% { opacity: 0; transform: scale(1.8); fill: #00f0ff; }
            }

            @keyframes weightPulse {
                0%, 100% { stroke-opacity: 0.1; }
                50% { stroke-opacity: 0.6; }
            }

            @keyframes rasterScroll {
                0% { transform: translateX(0); }
                100% { transform: translateX(-15px); }
            }

            .bloom { animation: bloomPulse 3s infinite; }
            .weight-line { stroke-opacity: 0.1; animation: weightPulse 4s infinite; }
        </style>

        <filter id="bloomFilter" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur1" />
            <feGaussianBlur stdDeviation="12" result="blur2" />
            <feMerge>
                <feMergeNode in="blur2" />
                <feMergeNode in="blur1" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <g id="lifNeuron">
            <circle cx="0" cy="0" r="10" class="g-line" stroke-width="2"/>
            <line x1="-12" y1="-8" x2="12" y2="-8" class="r-line" stroke-width="1" stroke-dasharray="2,2"/>
        </g>
    </defs>

    <g transform="translate(100, 350) skewY(-26.5)" opacity="0.1">
        <g class="weight-line" style="animation-delay: 0s;">
            <line x1="0" y1="0" x2="0" y2="400" stroke="#00f0ff" stroke-width="1"/>
            <line x1="100" y1="0" x2="100" y2="400" stroke="#00f0ff" stroke-width="1"/>
            <line x1="200" y1="0" x2="200" y2="400" stroke="#00f0ff" stroke-width="1"/>
            <line x1="300" y1="0" x2="300" y2="400" stroke="#00f0ff" stroke-width="1"/>
        </g>
        <g class="weight-line" style="animation-delay: 2s;">
            <line x1="0" y1="0" x2="400" y2="0" stroke="#00f0ff" stroke-width="1"/>
            <line x1="0" y1="100" x2="400" y2="100" stroke="#00f0ff" stroke-width="1"/>
            <line x1="0" y1="200" x2="400" y2="200" stroke="#00f0ff" stroke-width="1"/>
            <line x1="0" y1="300" x2="400" y2="300" stroke="#00f0ff" stroke-width="1"/>
        </g>
        <circle cx="100" cy="100" r="3" fill="#ffd700" opacity="0.3"/>
        <circle cx="200" cy="100" r="3" fill="#ffd700" opacity="0.6"/>
        <circle cx="100" cy="200" r="3" fill="#ffd700" opacity="0.4"/>
        <circle cx="300" cy="300" r="3" fill="#ffd700" opacity="0.8"/>
    </g>

    <g font-size="12" transform="translate(30, 40)" filter="url(#bloomFilter)">
        <text y="0">ENOTRIUM // SNN_CORE_COMPILER_v1.5</text>
        <text y="20">TARGET_ARCH: NPU_ARM64_AXI_BUS</text>
        <text y="40" class="r-text">TIME_STEP: 1ms // FIXED_UPDATE_LOCK</text>
        <text y="60">WEIGHT_PRECISION: INT8_QUANTIZED</text>
        <text y="80">NEURON_MODEL: LIF_INTEGRATION</text>
        <text y="100" class="r-text">
            <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
            [REC] PROFILING: Spike Rate Over_Time
        </text>
    </g>

    <g transform="translate(150, 450)">
        
        <g transform="translate(350, -50)">
            <polygon points="0,0 200,-100 400,0 200,100" class="g-fill" stroke-width="1.5" opacity="0.6" filter="url(#bloomFilter)"/>
            
            <g class="y-line" opacity="0.5">
                <path d="M -200,50 C -100,25 0,10 200,20" stroke-dasharray="4,4"/>
                <path d="M -200,50 C -100,75 0,90 200,80" stroke-dasharray="2,2"/>
            </g>

            <g transform="translate(200, 20)" class="bloom">
                <use href="#lifNeuron"/>
                <text x="20" y="5" font-size="10">N_ID: 0x01</text>
                
                <circle cx="0" cy="0" r="0" fill="rgba(255, 255, 255, 0.4)">
                    <animate attributeName="r" values="0;7;0" dur="2s" repeatCount="indefinite" />
                </circle>
                
                <circle cx="0" cy="0" r="10" fill="none" style="animation: spikePulse 1s infinite; animation-delay: 1.8s;"/>
            </g>

            <g transform="translate(200, 80)" opacity="0.8">
                <use href="#lifNeuron"/>
                <text x="20" y="5" font-size="10">N_ID: 0x02</text>
                
                <circle cx="0" cy="0" r="0" fill="rgba(255, 215, 0, 0.3)">
                    <animate attributeName="r" values="0;6;2" dur="1.5s" repeatCount="indefinite" />
                </circle>
            </g>
            
            <text x="350" y="0" font-size="12" class="g-text" transform="skewY(-26.5)">L2: Feature_Map</text>
        </g>

        <g transform="translate(400, -350)" filter="url(#bloomFilter)">
            <animateTransform attributeName="transform" type="translate" values="400,-350; 400,-362; 400,-350" dur="2.5s" repeatCount="indefinite" />
            
            <polygon points="0,-40 -35,-20 -35,20 0,40 35,20 35,-20" fill="#010309" class="g-line" stroke-width="2.5" />
            <polygon points="0,-18 -18,0 0,18 18,0" fill="#ffffff" opacity="0.9" />
            <circle cx="0" cy="0" r="8" fill="#00f0ff" />
            
            <ellipse cx="0" cy="0" rx="60" ry="22" class="g-line" opacity="0.7">
                <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="5s" repeatCount="indefinite" />
            </ellipse>
            <ellipse cx="0" cy="0" rx="80" ry="30" class="r-line" stroke-dasharray="12 12" opacity="0.5">
                <animateTransform attributeName="transform" type="rotate" values="360; 0" dur="7s" repeatCount="indefinite" />
            </ellipse>
            
            <line x1="-120" y1="180" x2="-120" y2="0" class="g-line" opacity="0.8" stroke-dasharray="15 45">
                <animate attributeName="stroke-dashoffset" values="60; 0" dur="1.2s" repeatCount="indefinite" />
            </line>
            <line x1="120" y1="120" x2="120" y2="0" class="y-line" opacity="0.6" stroke-dasharray="8 24">
                <animate attributeName="stroke-dashoffset" values="32; 0" dur="0.9s" repeatCount="indefinite" />
            </line>
        </g>

    </g>

    <g transform="translate(730, 400)">
        <text x="0" y="0" font-size="12">PROFILER // SPIKE_RASTER_PLOT</text>
        <line x1="0" y1="10" x2="250" y2="10" class="g-line" stroke-width="1"/>
        
        <g font-size="10" class="g-text">
            <text x="5" y="30">N_ID: 0x01</text>
            <text x="5" y="50">N_ID: 0x02</text>
            <text x="5" y="70">N_ID: 0x03</text>
        </g>
        
        <g transform="translate(70, 25)" class="g-line">
            <line x1="0" y1="0" x2="180" y2="0" opacity="0.2"/>
            <line x1="0" y1="20" x2="180" y2="20" opacity="0.2"/>
            <line x1="0" y1="40" x2="180" y2="40" opacity="0.2"/>

            <g style="animation: rasterScroll 1s steps(12) infinite;">
                <line x1="10" y1="-5" x2="10" y2="5" stroke-width="1.5"/>
                <line x1="40" y1="-5" x2="40" y2="5" stroke-width="1.5"/>
                <line x1="90" y1="-5" x2="90" y2="5" stroke-width="1.5"/>
                <line x1="130" y1="-5" x2="130" y2="5" stroke-width="1.5"/>

                <line x1="10" y1="15" x2="10" y2="25" class="r-line"/>
                <line x1="20" y1="15" x2="20" y2="25" class="r-line"/>
                <line x1="50" y1="15" x2="50" y2="25" class="r-line"/>
                <line x1="60" y1="15" x2="60" y2="25" class="r-line"/>

                <line x1="80" y1="35" x2="80" y2="45" class="y-line"/>
            </g>
        </g>

        <g transform="translate(0, 100)" font-size="12">
            <text x="0" y="0" class="r-text">[ERR] NPU_LOCAL_TIME_VIOLATION (2.3ms)</text>
            <text x="0" y="20">[MSG] Spike_Redux Optimization Req.</text>
            <g filter="url(#bloomFilter)">
                <rect x="0" y="30" width="250" height="20" class="r-fill"/>
                <text x="5" y="45" class="r-text">WARNING: SNN REBAKE NEEDED</text>
            </g>
        </g>
    </g>

</svg>
